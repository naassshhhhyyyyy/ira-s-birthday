<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Happy Birthday 🎂</title>
  <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎂%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/birthday.css">
</head>
<body>

<button class="btn toggle" id="themeToggle">🌙</button>

<!-- Page 1: Countdown -->
<div class="page countdown-page active" id="page1">
  <h1 id="count">3</h1>
</div>

<!-- Page 2: Cake -->
<div class="page" id="page2">
  <div class="card">
    <h1 class="title">Happy Birthday<br>Eden Ira 🎉</h1>
    <div id="cake" class="cake">🧁</div>
    <button class="btn" id="nextCakeBtn" disabled>Next</button>
  </div>
</div>

<!-- Page 3: Short Message typing -->
<div class="page" id="page3">
  <div class="card">
    <div id="message3" class="typing"></div>
    <button class="btn" id="nextMsg3Btn" disabled>Next</button>
  </div>
</div>

<!-- Page 5: Long Typing Message -->
<div class="page" id="page4">
  <div class="card">
    <div id="typing" class="typing-long"></div>
    <button class="btn" id="nextTypingBtn" disabled>Next</button>
  </div>
</div>

<!-- Page 6: Gift + Spotify typing -->
<div class="page" id="page5">
  <div class="card">
    <h2 id="giftTitle">Tap the Gift 🎁</h2>
    <div id="giftBox" class="gift-box">🎁</div>
    <div id="giftText" class="typing-gift"></div>
    <div class="spotify-container" id="spotifyContainer">
      <iframe src="https://open.spotify.com/embed/track/1udOOSbJnytCdgvbgYOF5s?utm_source=generator" allow="encrypted-media" loading="lazy"></iframe>
    </div>
  </div>
</div>

<audio id="birthdaySong" preload="auto">
  <source src="audio_chamber-music.mp3" type="audio/mpeg">
</audio>

<script src="js/birthday.js"></script>
</body>
</html>
